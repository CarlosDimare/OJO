name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'launcher/**'
      - 'tahc/**'
      - '*.gradle'
      - '*.properties'
      - 'settings.gradle'
      - 'gradlew'
      - 'gradle/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          packages: >-
            platforms;android-34
            build-tools;34.0.0
            platform-tools

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build all APKs
        run: |
          ./gradlew :launcher:assembleRelease :tahc:assembleRelease --no-daemon

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore /tmp/debug.keystore \
            -alias opencode \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=OpenCode,O=OpenCode,C=AR" \
            -storetype PKCS12 2>/dev/null

      - name: Sign launcher APK
        run: |
          APKSIGNER=$(ls $ANDROID_HOME/build-tools/*/apksigner | head -1)
          "$APKSIGNER" sign \
            --ks /tmp/debug.keystore \
            --ks-key-alias opencode \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out opencode-launcher.apk \
            launcher/build/outputs/apk/release/launcher-release-unsigned.apk

      - name: Sign Tahc APK
        run: |
          APKSIGNER=$(ls $ANDROID_HOME/build-tools/*/apksigner | head -1)
          "$APKSIGNER" sign \
            --ks /tmp/debug.keystore \
            --ks-key-alias opencode \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out opencode-tahc.apk \
            tahc/build/outputs/apk/release/tahc-release-unsigned.apk

      - name: Upload launcher
        uses: actions/upload-artifact@v4
        with:
          name: opencode-launcher
          path: opencode-launcher.apk
          if-no-files-found: error

      - name: Upload Tahc
        uses: actions/upload-artifact@v4
        with:
          name: opencode-tahc
          path: opencode-tahc.apk
          if-no-files-found: error
