name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '*.gradle'
      - '*.properties'
      - 'settings.gradle'
      - 'gradlew'
      - 'gradle/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          packages: >-
            platforms;android-34
            build-tools;34.0.0
            platform-tools

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Download Alpine ARM64 rootfs
        run: |
          mkdir -p app/src/main/assets
          wget -q https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/aarch64/alpine-minirootfs-3.21.3-aarch64.tar.gz \
            -O app/src/main/assets/alpine-arm64.tar.gz

      - name: Download Bun ARM64
        run: |
          wget -q https://github.com/oven-sh/bun/releases/latest/download/bun-linux-aarch64.zip \
            -O app/src/main/assets/bun-linux-aarch64.zip

      - name: Download proot ARM64
        run: |
          wget -q https://packages.termux.dev/apt/termux-main/pool/main/p/proot/proot_5.1.107.77_aarch64.deb \
            -O /tmp/proot.deb
          mkdir -p /tmp/proot-extract
          dpkg-deb -x /tmp/proot.deb /tmp/proot-extract
          cp /tmp/proot-extract/data/data/com.termux/files/usr/bin/proot \
            app/src/main/assets/proot-static-arm64
          chmod +x app/src/main/assets/proot-static-arm64
          rm -rf /tmp/proot.deb /tmp/proot-extract

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK (release)
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK with debug key
        run: |
          keytool -genkey -v \
            -keystore /tmp/debug.keystore \
            -alias opencode \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=OpenCode,O=OpenCode,C=AR" \
            -storetype PKCS12 2>/dev/null
          APKSIGNER=$(ls $ANDROID_HOME/build-tools/*/apksigner | head -1)
          "$APKSIGNER" sign \
            --ks /tmp/debug.keystore \
            --ks-key-alias opencode \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out opencode.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-apk
          path: opencode.apk
          if-no-files-found: error
